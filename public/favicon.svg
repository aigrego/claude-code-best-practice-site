<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.6"/>
  
  <!-- Inner hexagon with gradient -->
  <path d="M50 20 L73 33.5 L73 60.5 L50 74 L27 60.5 L27 33.5 Z" fill="none" stroke="url(#accentGrad)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Center C letter for Claude/Code -->
  <text x="50" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="url(#accentGrad)" filter="url(#glow)">C</text>
  
  <!-- Corner accents -->
  <circle cx="50" cy="20" r="3" fill="#00d4ff"/>
  <circle cx="73" cy="33.5" r="3" fill="#8b5cf6"/>
  <circle cx="73" cy="60.5" r="3" fill="#00d4ff"/>
  <circle cx="50" cy="74" r="3" fill="#8b5cf6"/>
  <circle cx="27" cy="60.5" r="3" fill="#00d4ff"/>
  <circle cx="27" cy="33.5" r="3" fill="#8b5cf6"/>
</svg>